<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Hunt Daily Top 50 — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body>
  <header>
    <div class="header-row">
      <h1><a href="/" class="home-link"><img class="brand-logo" src="logo.png" alt="" width="28" height="28" /> Product Hunt Daily Top 50</a></h1>
      <div class="day-nav">
        <button id="prev-day" title="Previous day">‹</button>
        <select id="day-select"></select>
        <button id="next-day" title="Next day">›</button>
      </div>
    </div>
    <div class="filter-row">
      <input id="search" type="search" placeholder="Search products..." />
      <select id="topic-filter">
        <option value="">All categories</option>
      </select>
      <span id="count" class="count"></span>
    </div>
  </header>

  <main>
    <div id="status" class="status" hidden></div>
    <div id="cards" class="cards"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
